{# templates/_topbar.html – Sprint 3 Wave 2 (CRM-045) #}
{# Fix 2026-05-20: Wortmarke größer (18px), Logo 38px, Symbol-SVG, Rechts-Bereich geleert #}
{# Erwartet im Context: prefix, current_user (mit initials, color_idx) #}
<header id="topbar"
        style="height: var(--topbar-height);
               background: var(--bg-nav);
               border-bottom: 1px solid var(--border-sub);
               position: sticky; top: 0; z-index: 200;
               display: flex; align-items: center;
               padding: 0 20px;
               justify-content: space-between;
               flex-shrink: 0;">

  <!-- Links: Hamburger (Mobile only) + Logo + Separator + Wortmarke -->
  <div style="display: flex; align-items: center; gap: 12px;">

    <!-- Hamburger: nur < 1024px (CSS-Klasse hamburger-btn steuert display) -->
    <button id="sidebar-toggle"
            class="hamburger-btn"
            aria-label="Navigation oeffnen"
            style="display: none;
                   width: 36px; height: 36px;
                   background: transparent; border: none;
                   color: var(--text-muted); cursor: pointer;
                   padding: 4px; border-radius: 6px;
                   align-items: center; justify-content: center;"
            onmouseover="this.style.color='var(--text-primary)'; this.style.background='rgba(255,255,255,0.06)'"
            onmouseout="this.style.color='var(--text-muted)'; this.style.background='transparent'">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- Logo + Wortmarke als Home-Link -->
    <a href="{{ prefix }}/" style="display:flex; align-items:center; gap:12px; text-decoration:none;"
       onmouseover="this.style.opacity=0.85" onmouseout="this.style.opacity=1">
      <img src="{{ prefix }}/static/brand/Symbol-white-transparent.svg"
           alt="CBH" style="height: 38px;" />
      <span style="color: var(--border); font-size: 14px;">|</span>
      <span style="font-family: 'Barlow', sans-serif;
                   font-weight: 900;
                   font-size: 18px;
                   letter-spacing: 0.14em;
                   text-transform: uppercase;
                   color: var(--text-primary);
                   overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 280px;">
        CBH MISSION CTRL
      </span>
    </a>
  </div>

  <!-- Rechts: leer (Settings + Logout wandern in Sidebar Account-Bereich) -->
  <div></div>

</header>
